<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <!-- TAilwind -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#F1F2F4] py-12">
    <header class="w-[80%] mx-auto">
        <h1 class="text-4xl font-bold text-[#002C5C]">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-4 mt-5">
            <div class="bg-white rounded-[6px] p-4">
                <p class="font-semibold">Total</p>
                <h4 id="totalCount" class="text-2xl font-bold text-[#002C5C]">8</h4>
            </div>
            <div class="bg-white rounded-[6px] p-4">
                <p class="font-semibold">Interview</p>
                <h4 id="interviewCount"  class="text-2xl font-bold text-[#10B981]">0</h4>
            </div>
            <div class="bg-white rounded-[6px] p-4">
                <p class="font-semibold">Rejected</p>
                <h4 id="rejectedCount" class="text-2xl font-bold text-[#EF4444]">0</h4>
            </div>
        </div>
    </header>
    <hr class="my-8">
    <main class="w-[80%] mx-auto">
        <div>
            <button class="bg-[#3B82F6] text-white rounded-[6px] px-8 py-1 cursor-pointer" id="allFilterBtn">All</button>
            <button  class="bg-white text-[#64748B] rounded-[6px] px-5 py-1 mx-1  cursor-pointer hover:bg-[#3B82F6] hover:text-white" id="interviewFilterBtn">Interview</button>
            <button class="bg-white text-[#64748B] rounded-[6px] px-5 py-1 cursor-pointer hover:bg-[#3B82F6] hover:text-white" id="rejectedFilterBtn">Rejected</button>
        </div>

        <section id="allCards">
            <!-- card 1 -->
             <div>
                <div>
                    <h3 class="cardJobTitle">Mobile First Corp</h3>
                    <p class="cardJobRole">React Native Developer</p>
                    <p class="cardJobDetails">Remote • Full-time • $130,000 - $175,000</p>
                    <h6 class="cardJobStatus">Not Applied</h6>
                    <p class="cardJobDescription">Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.</p>
                    <div>
                        <button class="interviewBtn"">Interview</button>
                        <button class="rejectedBtn"">Rejected</button>
                    </div>
                </div>
                <div></div>
             </div>
        </section>
    </main>



    <script src="/script.js"></script>
</body>
</html>
